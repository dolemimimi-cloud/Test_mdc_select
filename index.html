<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 MDC 선택과정 신청</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz4FINVoZs1oiVaenj3b1zS16np1PXYhqSQZSXk4FLJIbgRQsxYIRVV0Jh8g_Z6fPG7og/exec';

        const Calendar = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
        );

        const Users = () => (
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                <circle cx="9" cy="7" r="4"></circle>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
        );

        const BookOpen = () => (
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
            </svg>
        );

        const CourseRegistrationSystem = () => {
            const [currentMonth, setCurrentMonth] = useState(9);
            
            const courses = [
                { id: 1, name: '피드백 스킬 1차수', date: '2026-10-27', capacity: 4, color: 'emerald' },
                { id: 2, name: '피드백 스킬 2차수', date: '2026-10-29', capacity: 4, color: 'emerald' },
                { id: 3, name: '브릿지 리더십', date: '2026-10-30', capacity: 4, color: 'violet' },
                { id: 4, name: '동기부여 리더십 1차수', date: '2026-10-31', capacity: 4, color: 'amber' },
                { id: 5, name: '동기부여 리더십 2차수', date: '2026-11-04', capacity: 4, color: 'amber' }
            ];

            const [loading, setLoading] = useState(false);
            const [registrations, setRegistrations] = useState([]);
            
            React.useEffect(() => {
                loadData();
                const interval = setInterval(loadData, 5000);
                return () => clearInterval(interval);
            }, []);

            const loadData = async () => {
                try {
                    const callbackName = 'jsonpCallback' + Date.now();
                    const script = document.createElement('script');
                    
                    window[callbackName] = (data) => {
                        if (data.registrations) {
                            setRegistrations(data.registrations);
                        }
                        document.body.removeChild(script);
                        delete window[callbackName];
                    };
                    
                    script.src = `${GOOGLE_SCRIPT_URL}?callback=${callbackName}&_=${Date.now()}`;
                    document.body.appendChild(script);
                } catch (error) {
                    console.error('데이터 로드 실패:', error);
                }
            };

            const getRegistrationCount = (courseId) => {
                const course = courses.find(c => c.id === courseId);
                return registrations.filter(reg => reg.course === course.name).length;
            };

            const [formData, setFormData] = useState({
                name: '',
                department: '',
                email: '',
                selectedCourses: [],
                waitlistCourse: ''
            });
            const [submitSuccess, setSubmitSuccess] = useState(false);

            const handleCourseToggle = (courseId) => {
                const course = courses.find(c => c.id === parseInt(courseId));
                const current = formData.selectedCourses;
                
                if (current.includes(courseId)) {
                    // 선택 해제
                    setFormData({
                        ...formData,
                        selectedCourses: current.filter(id => id !== courseId)
                    });
                } else {
                    // 같은 과정의 다른 차수가 이미 선택되어 있는지 확인
                    const courseName = course.name.replace(/\s*\d+차수/, ''); // "피드백 스킬" 추출
                    
                    const hasSameCourse = current.some(selectedId => {
                        const selectedCourse = courses.find(c => c.id === parseInt(selectedId));
                        const selectedCourseName = selectedCourse.name.replace(/\s*\d+차수/, '');
                        return courseName === selectedCourseName;
                    });
                    
                    if (hasSameCourse) {
                        alert(`이미 "${courseName}" 과정의 다른 차수를 선택하셨습니다.\n같은 과정의 여러 차수를 동시에 선택할 수 없습니다.`);
                        return;
                    }
                    
                    setFormData({
                        ...formData,
                        selectedCourses: [...current, courseId]
                    });
                }
            };

            const handleSubmit = async () => {
                if (!formData.name || !formData.department || !formData.email) {
                    alert('기본 정보를 모두 입력해주세요.');
                    return;
                }

                if (formData.selectedCourses.length === 0) {
                    alert('과정 및 차수를 최소 1개 이상 선택해주세요.');
                    return;
                }

                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(formData.email)) {
                    alert('올바른 이메일 형식을 입력해주세요.');
                    return;
                }

                setLoading(true);
                
                await new Promise(resolve => {
                    const callbackName = 'refreshCallback' + Date.now();
                    const script = document.createElement('script');
                    
                    window[callbackName] = (data) => {
                        if (data.registrations) {
                            setRegistrations(data.registrations);
                        }
                        document.body.removeChild(script);
                        delete window[callbackName];
                        resolve();
                    };
                    
                    script.src = `${GOOGLE_SCRIPT_URL}?callback=${callbackName}&_=${Date.now()}`;
                    document.body.appendChild(script);
                });

                const isDuplicate = registrations.some(reg => 
                    reg.name === formData.name && 
                    reg.email === formData.email
                );

                if (isDuplicate) {
                    alert('이미 수강신청을 완료하셨습니다.\n과정 변경이 필요하시면 Learning&Value 팀으로 문의해주세요.');
                    setLoading(false);
                    return;
                }

                for (let courseId of formData.selectedCourses) {
                    const course = courses.find(c => c.id === parseInt(courseId));
                    const currentCount = registrations.filter(reg => reg.course === course.name).length;
                    
                    if (currentCount >= course.capacity) {
                        alert(`죄송합니다. "${course.name}" 과정은 정원이 마감되었습니다.\n다른 과정을 선택해주세요.`);
                        setLoading(false);
                        return;
                    }
                }

                const selectedCourseNames = formData.selectedCourses
                    .map(id => courses.find(c => c.id === parseInt(id))?.name)
                    .filter(Boolean)
                    .join(', ');

                const waitlistCourseName = formData.waitlistCourse 
                    ? courses.find(c => c.id === parseInt(formData.waitlistCourse))?.name 
                    : '';

                try {
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            name: formData.name,
                            department: formData.department,
                            email: formData.email,
                            course: selectedCourseNames,
                            date: '',
                            waitlist: waitlistCourseName
                        })
                    });

                    setSubmitSuccess(true);
                    setFormData({
                        name: '',
                        department: '',
                        email: '',
                        selectedCourses: [],
                        waitlistCourse: ''
                    });
                    
                    setTimeout(() => loadData(), 1000);
                } catch (error) {
                    console.error('신청 실패:', error);
                    alert('신청 중 오류가 발생했습니다. 다시 시도해주세요.');
                } finally {
                    setLoading(false);
                }
            };

            const renderCalendar = () => {
                const monthNames = ['1월', '2월', '3월', '4월', '5월', '6월', '7월', '8월', '9월', '10월', '11월', '12월'];
                const daysInMonthMap = [31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
                const monthStartDays = [3, 6, 6, 2, 4, 0, 2, 5, 1, 3, 6, 1];
                
                const holidays = ['2026-10-03', '2026-10-09'];
                
                const daysInMonth = daysInMonthMap[currentMonth];
                const startDay = monthStartDays[currentMonth];
                const year = 2026;
                const month = currentMonth + 1;

                const calendar = [];
                for (let i = 0; i < startDay; i++) {
                    calendar.push(null);
                }
                for (let day = 1; day <= daysInMonth; day++) {
                    calendar.push(day);
                }

                const getCourseForDate = (day) => {
                    const dateStr = `${year}-${month.toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}`;
                    return courses.find(c => c.date === dateStr);
                };

                const isHoliday = (day) => {
                    const dateStr = `${year}-${month.toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}`;
                    return holidays.includes(dateStr);
                };

                const getTextColor = (color) => {
                    const colorMap = {
                        emerald: 'text-emerald-700',
                        violet: 'text-violet-700',
                        amber: 'text-amber-700',
                        blue: 'text-blue-700'
                    };
                    return colorMap[color] || 'text-blue-700';
                };

                const getStatusBgColor = (count, capacity) => {
                    if (count >= capacity) return 'bg-red-400';
                    if (count >= capacity - 1) return 'bg-orange-300';
                    return 'bg-green-200';
                };

                return (
                    <div className="bg-white p-3 rounded-lg shadow-sm border border-gray-200">
                        <div className="flex items-center justify-between mb-2">
                            <button
                                onClick={() => currentMonth > 9 && setCurrentMonth(currentMonth - 1)}
                                disabled={currentMonth <= 9}
                                className="p-1 rounded hover:bg-gray-100 disabled:opacity-30 disabled:cursor-not-allowed"
                            >
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                    <polyline points="15 18 9 12 15 6"></polyline>
                                </svg>
                            </button>
                            <h3 className="font-semibold text-base flex items-center gap-2">
                                <Calendar />
                                2026년 {monthNames[currentMonth]}
                            </h3>
                            <button
                                onClick={() => currentMonth < 10 && setCurrentMonth(currentMonth + 1)}
                                disabled={currentMonth >= 10}
                                className="p-1 rounded hover:bg-gray-100 disabled:opacity-30 disabled:cursor-not-allowed"
                            >
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                    <polyline points="9 18 15 12 9 6"></polyline>
                                </svg>
                            </button>
                        </div>
                        <div className="grid grid-cols-7 gap-1">
                            {['일', '월', '화', '수', '목', '금', '토'].map((day, idx) => (
                                <div key={day} className={`text-center font-semibold text-xs p-1 bg-gray-50 ${idx === 0 ? 'text-red-600' : idx === 6 ? 'text-blue-600' : ''}`}>
                                    {day}
                                </div>
                            ))}
                            {calendar.map((day, idx) => {
                                const course = day ? getCourseForDate(day) : null;
                                const count = course ? getRegistrationCount(course.id) : 0;
                                const dayOfWeek = day ? (startDay + day - 1) % 7 : null;
                                const isSunday = dayOfWeek === 0;
                                const isSaturday = dayOfWeek === 6;
                                const isHolidayDate = day ? isHoliday(day) : false;
                                const isRedDay = isSunday || isHolidayDate;
                                
                                return (
                                    <div
                                        key={idx}
                                        className={`min-h-16 p-1 border border-gray-100 ${
                                            day ? 'bg-white' : 'bg-gray-50'
                                        }`}
                                    >
                                        {day && (
                                            <>
                                                <div className={`text-xs font-semibold mb-1 ${isRedDay ? 'text-red-600' : isSaturday ? 'text-blue-600' : ''}`}>{day}</div>
                                                {course && (
                                                    <div className={`text-xs p-1 rounded ${getStatusBgColor(count, course.capacity)}`}>
                                                        <div className={`font-medium truncate text-xs ${getTextColor(course.color)}`} title={course.name}>{course.name}</div>
                                                        <div className="flex items-center gap-1 mt-1 text-gray-700">
                                                            <Users />
                                                            <span className="text-xs">{count}/{course.capacity}</span>
                                                        </div>
                                                    </div>
                                                )}
                                            </>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                );
            };

            const getFullCourses = () => {
                return courses.filter(course => {
                    const count = getRegistrationCount(course.id);
                    return count >= course.capacity;
                });
            };

            return (
                <div className="min-h-screen bg-gray-50">
                    <div className="max-w-6xl mx-auto p-6">
                        <a 
                            href="https://krafton.atlassian.net/wiki/x/38soG" 
                            target="_blank" 
                            rel="noopener noreferrer"
                            className="block bg-gradient-to-r from-gray-800 to-gray-900 text-white p-4 rounded-lg mb-4 hover:from-gray-700 hover:to-gray-800 transition-colors cursor-pointer"
                        >
                            <h1 className="text-3xl font-bold">
                                <BookOpen className="inline-block mr-3" />
                                2026 MDC 선택과정 신청
                            </h1>
                        </a>

                        <div className="bg-yellow-50 border-l-4 border-yellow-400 p-5 rounded-lg mb-6 shadow-sm">
                            <div className="flex items-start">
                                <div className="flex-shrink-0">
                                    <svg className="h-5 w-5 text-yellow-600 mt-0.5" viewBox="0 0 20 20" fill="currentColor">
                                        <path fillRule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clipRule="evenodd" />
                                    </svg>
                                </div>
                                <div className="ml-3 flex-1">
                                    <div className="text-gray-800 space-y-3 leading-relaxed text-sm">
                                        <p className="font-semibold text-base">안녕하세요 :D<br/>People Dept. Learning & Value Team입니다.</p>
                                        
                                        <p>
                                            2026년도 Manager Development Camp(이하 MDC) 과정 수강신청 안내 드립니다.<br/>
                                            MDC는 '매니저의 리더십은 각자 다르며, 개발되고 발전될 수 있다'는 신념 아래, 고유한 리더십 스타일을 탐색하고 강점과 보완점을 개발할 수 있도록 2023년부터 운영 중인 리더십 프로그램 입니다.
                                        </p>
                                        
                                        <p>
                                            본 과정은 26년 하반기 필수과정(9월)과 선택과정(10월)으로 구성되어 있으며, 금번 신청은 '선택과정(5개 과정 중 택1)'에 해당합니다. 그럼 업무 일정을 고려하시어 <span className="font-bold text-yellow-800 bg-yellow-200 px-1 rounded">기간(9/15 - 9/17) 내 수강 신청을 완료</span>해 주시기 바랍니다. 감사합니다.
                                        </p>
                                        
                                        <p className="text-xs text-gray-600 pt-2 border-t border-yellow-200">
                                            * Slack channel: #ask-training
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {submitSuccess && (
                            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" onClick={() => setSubmitSuccess(false)}>
                                <div className="bg-white rounded-lg shadow-xl p-8 max-w-md mx-4" onClick={(e) => e.stopPropagation()}>
                                    <div className="flex flex-col items-center text-center">
                                        <div className="w-16 h-16 bg-yellow-100 rounded-full flex items-center justify-center mb-4">
                                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="text-yellow-600">
                                                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                                                <polyline points="22 4 12 14.01 9 11.01"></polyline>
                                            </svg>
                                        </div>
                                        <h3 className="text-2xl font-bold text-gray-900 mb-2">신청 완료!</h3>
                                        <p className="text-gray-600 mb-6">수강신청이 성공적으로 완료되었습니다.</p>
                                        <button
                                            onClick={() => setSubmitSuccess(false)}
                                            className="bg-yellow-400 text-gray-900 px-6 py-2 rounded-lg font-semibold hover:bg-yellow-500 transition-colors"
                                        >
                                            확인
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        <div className="mb-6 flex gap-4">
                            <div className="w-36 flex-shrink-0">
                                <div className="bg-white p-3 rounded-lg shadow-sm border border-gray-200 sticky top-6">
                                    <h3 className="font-semibold mb-2 text-sm">신청 현황</h3>
                                    <div className="space-y-2 text-xs">
                                        <div className="flex items-center gap-2">
                                            <div className="w-3 h-3 bg-green-200 rounded flex-shrink-0"></div>
                                            <span>여유 (0-2명)</span>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <div className="w-3 h-3 bg-orange-300 rounded flex-shrink-0"></div>
                                            <span>마감임박 (3명)</span>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <div className="w-3 h-3 bg-red-400 rounded flex-shrink-0"></div>
                                            <span>마감 (4명)</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="flex-1">
                                {renderCalendar()}
                            </div>
                        </div>

                        <div className="grid grid-cols-1 gap-6">
                            <div className="bg-white rounded-lg shadow-md p-6">
                                <h2 className="text-xl font-semibold mb-4">기본 정보</h2>
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">
                                            이름 <span className="text-red-500">*</span>
                                        </label>
                                        <input
                                            type="text"
                                            value={formData.name}
                                            onChange={(e) => setFormData({...formData, name: e.target.value})}
                                            className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-yellow-400"
                                        />
                                    </div>

                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">
                                            소속 <span className="text-red-500">*</span>
                                        </label>
                                        <input
                                            type="text"
                                            value={formData.department}
                                            onChange={(e) => setFormData({...formData, department: e.target.value})}
                                            className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-yellow-400"
                                        />
                                    </div>

                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">
                                            이메일 <span className="text-red-500">*</span>
                                        </label>
                                        <input
                                            type="email"
                                            value={formData.email}
                                            onChange={(e) => setFormData({...formData, email: e.target.value})}
                                            className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-yellow-400"
                                        />
                                    </div>

                                    <div>
                                        <label className="block mb-1">
                                            <span className="text-xl font-semibold text-gray-900">과정 및 차수 선택</span>
                                            <span className="text-red-500"> *</span>
                                        </label>
                                        <p className="text-base text-gray-600 mb-3">학습 정원이 정해져 있으므로 반드시 수강하실 수 있는 과정만 선택해주세요 (최소 1개 필수, 복수 선택 가능)</p>
                                        <div className="space-y-2">
                                            {courses.map(course => {
                                                const count = getRegistrationCount(course.id);
                                                const isFull = count >= course.capacity;
                                                const isSelected = formData.selectedCourses.includes(course.id.toString());
                                                
                                                const getTextColor = (color) => {
                                                    const colorMap = {
                                                        emerald: 'text-emerald-700',
                                                        violet: 'text-violet-700',
                                                        amber: 'text-amber-700'
                                                    };
                                                    return colorMap[color] || 'text-blue-700';
                                                };
                                                
                                                return (
                                                    <label
                                                        key={course.id}
                                                        className={`flex items-center justify-between p-3 border-2 rounded-lg cursor-pointer transition-colors ${
                                                            isFull
                                                                ? 'bg-gray-100 border-gray-300 cursor-not-allowed opacity-60'
                                                                : 'border-gray-300'
                                                        } ${
                                                            !isFull && isSelected
                                                            ? 'bg-gray-50'
                                                            : !isFull ? 'bg-white hover:bg-gray-50' : ''
                                                        }`}
                                                    >
                                                        <div className="flex items-center gap-3">
                                                            <input
                                                                type="checkbox"
                                                                value={course.id}
                                                                checked={isSelected}
                                                                onChange={() => !isFull && handleCourseToggle(course.id.toString())}
                                                                disabled={isFull}
                                                                className="w-4 h-4"
                                                            />
                                                            <div>
                                                                <div className={`font-medium ${getTextColor(course.color)}`}>{course.name}</div>
                                                                <div className="text-sm text-gray-600">{course.date}</div>
                                                            </div>
                                                        </div>
                                                        <div className={`flex items-center gap-1 px-3 py-1 rounded-full text-sm font-medium ${
                                                            isFull
                                                                ? 'bg-red-100 text-red-700'
                                                                : count >= 3
                                                                ? 'bg-orange-100 text-orange-700'
                                                                : 'bg-green-100 text-green-700'
                                                        }`}>
                                                            <Users />
                                                            <span>{count}/{course.capacity}</span>
                                                            {isFull && <span className="ml-1">(마감)</span>}
                                                        </div>
                                                    </label>
                                                );
                                            })}
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block mb-1">
                                            <span className="text-xl font-semibold text-gray-900">대기 신청</span>
                                        </label>
                                        <p className="text-base text-gray-600 mb-3">수강을 원하는 과정 및 차수의 정원 마감 시 대기 신청이 가능합니다. 기존 인원의 수강 취소 시 담당자가 별도 안내드릴 예정입니다. (필요시 1개 과정 대기 가능)</p>
                                        
                                        {getFullCourses().length === 0 ? (
                                            <div className="p-4 bg-gray-50 rounded-lg border-2 border-gray-300 text-center text-gray-600">
                                                현재는 마감된 과정이 없습니다. 원하시는 과정을 선택해주시기 바랍니다.
                                            </div>
                                        ) : (
                                            <div className="space-y-2">
                                                {getFullCourses().map(course => {
                                                    const count = getRegistrationCount(course.id);
                                                    const isSelected = formData.waitlistCourse === course.id.toString();
                                                    
                                                    const getTextColor = (color) => {
                                                        const colorMap = {
                                                            emerald: 'text-emerald-700',
                                                            violet: 'text-violet-700',
                                                            amber: 'text-amber-700'
                                                        };
                                                        return colorMap[color] || 'text-blue-700';
                                                    };
                                                    
                                                    return (
                                                        <label
                                                            key={course.id}
                                                            className={`flex items-center justify-between p-3 border-2 rounded-lg cursor-pointer transition-colors border-gray-300 ${
                                                                isSelected ? 'bg-gray-50' : 'bg-white hover:bg-gray-50'
                                                            }`}
                                                        >
                                                            <div className="flex items-center gap-3">
                                                                <input
                                                                    type="radio"
                                                                    name="waitlist"
                                                                    value={course.id}
                                                                    checked={isSelected}
                                                                    onChange={(e) => setFormData({...formData, waitlistCourse: e.target.value})}
                                                                    className="w-4 h-4"
                                                                />
                                                                <div>
                                                                    <div className={`font-medium ${getTextColor(course.color)}`}>{course.name}</div>
                                                                    <div className="text-sm text-gray-600">{course.date}</div>
                                                                </div>
                                                            </div>
                                                            <div className="flex items-center gap-1 px-3 py-1 rounded-full text-sm font-medium bg-red-100 text-red-700">
                                                                <Users />
                                                                <span>{count}/{course.capacity}</span>
                                                                <span className="ml-1">(마감)</span>
                                                            </div>
                                                        </label>
                                                    );
                                                })}
                                            </div>
                                        )}
                                    </div>

                                    <button
                                        onClick={handleSubmit}
                                        disabled={loading}
                                        className="w-full bg-yellow-400 text-gray-900 py-3 rounded-lg font-bold hover:bg-yellow-500 transition-colors disabled:bg-gray-400 disabled:cursor-not-allowed shadow-md"
                                    >
                                        {loading ? '처리 중...' : '✓ 수강신청하기'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<CourseRegistrationSystem />, document.getElementById('root'));
    </script>
</body>
</html>
